services:
  dentales-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dentales-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      SITE_URL: https://solucionodont.shop
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.odonto-api.rule=Host(`api.solucionodont.shop`)"
      - "traefik.http.routers.odonto-api.entrypoints=websecure"
      - "traefik.http.routers.odonto-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.odonto-api.loadbalancer.server.port=8000"

  dentales-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_WA_NUMBER: ${NEXT_PUBLIC_WA_NUMBER}
        API_URL: https://api.solucionodont.shop
    container_name: dentales-frontend
    restart: unless-stopped
    depends_on:
      - dentales-backend
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik"
      - "traefik.http.routers.odonto-web.rule=Host(`solucionodont.shop`) || Host(`www.solucionodont.shop`)"
      - "traefik.http.routers.odonto-web.entrypoints=websecure"
      - "traefik.http.routers.odonto-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.odonto-web.loadbalancer.server.port=3000"

networks:
  traefik:
    external: true
    name: traefik
