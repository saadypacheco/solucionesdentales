version: "3.9"

services:
  dentales-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_WA_NUMBER: ${NEXT_PUBLIC_WA_NUMBER}
        API_URL: ${API_URL}
    container_name: dentales-frontend
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.dentales-web.rule=Host(`solucionodont.shop`,`www.solucionodont.shop`)
      - traefik.http.routers.dentales-web.entrypoints=web,websecure
      - traefik.http.routers.dentales-web.tls=true
      - traefik.http.routers.dentales-web.tls.certresolver=mytlschallenge
      - traefik.http.services.dentales-web.loadbalancer.server.port=3000
    networks:
      - root_default
    depends_on:
      - dentales-backend

  dentales-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dentales-backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - traefik.enable=true
      - traefik.http.routers.dentales-api.rule=Host(`api.solucionodont.shop`)
      - traefik.http.routers.dentales-api.entrypoints=web,websecure
      - traefik.http.routers.dentales-api.tls=true
      - traefik.http.routers.dentales-api.tls.certresolver=mytlschallenge
      - traefik.http.services.dentales-api.loadbalancer.server.port=8000
    networks:
      - root_default

networks:
  root_default:
    external: true
