# Nginx config — Soluciones Dentales API
# Archivo: /etc/nginx/sites-available/dentales-api
# Symlink: ln -s /etc/nginx/sites-available/dentales-api /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name api.solucionesdentales.com;

    # Redirigir todo a HTTPS (Certbot lo configura automáticamente)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.solucionesdentales.com;

    # Certbot agrega estas líneas automáticamente:
    # ssl_certificate     /etc/letsencrypt/live/api.solucionesdentales.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.solucionesdentales.com/privkey.pem;

    # Seguridad básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # CORS para Vercel (el frontend maneja CORS también en FastAPI)
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS";
    add_header Access-Control-Allow-Headers "Authorization, Content-Type";

    location / {
        proxy_pass         http://localhost:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (Supabase Realtime en el futuro)
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_read_timeout    60s;
    }
}
